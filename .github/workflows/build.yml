name: build

on:
  pull_request:
  push:
    branches:
    - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup node
      uses: actions/setup-node@v4
      with:
        node-version-file: 'package.json'
    - name: Enable corepack
      run: corepack enable
    - name: Install
      run: pnpm install
    - name: Build
      run: pnpm build
